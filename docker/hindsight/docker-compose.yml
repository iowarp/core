services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    ports:
      - "8888:8888" # API
      - "9999:9999" # Control Plane UI
    environment:
      HINDSIGHT_API_LLM_PROVIDER: openai
      HINDSIGHT_API_LLM_API_KEY: sk-local
      HINDSIGHT_API_LLM_MODEL: qwen
      HINDSIGHT_API_LLM_BASE_URL: http://iowarp-llm-test:8090/v1
      HINDSIGHT_API_HOST: 0.0.0.0
      HINDSIGHT_API_PORT: 8888
      HINDSIGHT_API_LOG_LEVEL: info
      HINDSIGHT_CP_DATAPLANE_API_URL: http://localhost:8888
    volumes:
      - hindsight_data:/app/data
    networks:
      - memorybench-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  hindsight_data:

networks:
  memorybench-net:
    external: true
