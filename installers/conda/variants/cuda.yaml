# IOWarp Core - CUDA Variant
# CUDA-enabled release build using CMakePresets.json "cuda-release" preset
#
# Usage: rattler-build build --recipe recipe/ --variant-config variants/cuda.yaml

preset:
  - cuda-release

cuda_enabled:
  - "ON"
rocm_enabled:
  - "OFF"
mpi_enabled:
  - "OFF"
mpi_impl:
  - nompi
