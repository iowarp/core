# Acropolis end-to-end example: CTE with adaptive indexing depth.
#
# Three levels:
#   0  name        filename only
#   1  metadata    + format-specific extraction + embedding
#   2  content     L1 + caller-supplied LLM summary (CAE drives this)

runtime:
  num_threads: 4
  queue_depth: 256
  conf_dir: /tmp/cte_depth_test

compose:
  - mod_name: wrp_cte_core
    pool_name: wrp_cte_core
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: /tmp/cte_depth_test/ram_storage
        bdev_type: ram
        capacity_limit: 512MB

    # --- Pick one ---
    # knowledge_graph:
    #   backend: bm25
    # knowledge_graph:
    #   backend: qdrant
    #   config: "localhost:6333/cte_depth_bench"
    # knowledge_graph:
    #   backend: elasticsearch
    #   config: "localhost:9200/cte_depth_bench vector"
    knowledge_graph:
      backend: bm25

    # Acropolis adaptive indexing depth
    indexing_depth:
      default: 0
      formats:
        h5:      1
        hdf5:    1
        nc:      1
        nc4:     1
        parquet: 1
        csv:     1
        mp4:     0

    # Shared embedding endpoint (used at L1 and L2 + by Qdrant/ES vector mode).
    # Omit if you're only running L0 with a keyword backend.
    embedding:
      endpoint: "http://localhost:8090/v1/embeddings"
      model: "qwen2.5-3b"
