networking:
  port: 9413
  neighborhood_size: 4
  hostfile: "/mnt/common/rpawar4/clio-core/bench_distributed_hostfile"
  wait_for_restart: 60
  wait_for_restart_poll_period: 1

runtime:
  num_threads: 8
  queue_depth: 1024
  local_sched: "default"

compose:
  - mod_name: wrp_cte_core
    pool_name: wrp_cte_core
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: /tmp/cte_bench_distributed/ram_storage
        bdev_type: ram
        capacity_limit: 1GB
        score: 1.0
    dpe:
      dpe_type: max_bw
    targets:
      neighborhood: 4
      default_target_timeout_ms: 30000
      poll_period_ms: 5000
