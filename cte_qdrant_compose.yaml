runtime:
  num_threads: 4
  queue_depth: 256
  conf_dir: /tmp/cte_qdrant_test

compose:
  - mod_name: wrp_cte_core
    pool_name: wrp_cte_core
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: /tmp/cte_qdrant_test/ram_storage
        bdev_type: ram
        capacity_limit: 512MB
    knowledge_graph:
      backend: qdrant
      config: "localhost:6333/cte_wrf_bench http://localhost:8090/v1/embeddings"
