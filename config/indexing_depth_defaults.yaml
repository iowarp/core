# Acropolis — adaptive indexing depth defaults.
#
# Drop this block into the `wrp_cte_core` section of your compose YAML.
# Per-file overrides use the xattr `user.acropolis.depth`.
# Per-directory (recursive) overrides use `user.acropolis.depth_recursive`.
#
# Three depth levels (each is additive — N includes the work of all
# lower levels):
#
#   0  Name      filename, path, size, ext            ~zero cost
#   1  Metadata  + format detection,                   ~ms per file
#                + format-specific extractor output
#                  (HDF5 dataset tree, etc.),
#                + embedding generated from this text
#   2  Content   same as L1 inside CTE, plus the      ~LLM call
#                caller (e.g. CAE) supplies an
#                LLM-generated natural-language
#                summary that the runtime appends
#                to the indexed text.

indexing_depth:
  # Global default applied when no xattr or format override matches.
  default: 0

  # Format-specific defaults (key = lowercase file extension).
  formats:
    h5:      1        # HDF5  -> walk groups + embedding
    hdf5:    1
    nc:      1        # NetCDF
    nc4:     1
    netcdf:  1
    parquet: 1
    pq:      1
    csv:     1
    tsv:     1
    bin:     0
    mp4:     0        # don't waste money on video by default
    mov:     0
    jpg:     0
    png:     0
    log:     0

# Embedding endpoint (used at L1 and L2 — turns the indexed text into a vector).
# Env vars CTE_EMBEDDING_ENDPOINT / CTE_EMBEDDING_MODEL override these.
embedding:
  endpoint: "http://localhost:8090/v1/embeddings"
  model:    "qwen2.5-3b"
