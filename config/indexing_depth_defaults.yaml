# Acropolis — adaptive indexing depth defaults.
#
# Drop this block into the `wrp_cte_core` section of your compose YAML.
# Per-file overrides use the xattr `user.acropolis.depth`.
# Per-directory (recursive) overrides use `user.acropolis.depth_recursive`.
#
# Depth levels:
#   0  Name only          (~zero cost)   filename, path, size, timestamps
#   1  Stat metadata      (~zero cost)   format detection, xattrs
#   2  Format extraction  (~ms)          HDF5/NetCDF/Parquet internals
#   3  Embedding          (~$0.001-0.01) text summary -> embedding vector
#   4  Deep content       (~$0.01-10+)   actual data values / statistics

indexing_depth:
  # Global default applied when no xattr or format override matches.
  default: 0

  # Format-specific defaults (key = lowercase file extension).
  formats:
    h5:      2        # HDF5
    hdf5:    2
    nc:      2        # NetCDF
    nc4:     2
    netcdf:  2
    parquet: 2
    pq:      2
    csv:     1
    tsv:     1
    bin:     0
    mp4:     0        # don't waste money on video by default
    mov:     0
    jpg:     0
    png:     0
    log:     1        # sniff format but don't parse internals

# Embedding endpoint (used for L3 depth and semantic backends like Qdrant).
# Env vars CTE_EMBEDDING_ENDPOINT / CTE_EMBEDDING_MODEL override these.
embedding:
  endpoint: "http://localhost:8090/v1/embeddings"
  model:    "qwen2.5-3b"
