---
# CTE Configuration for FUSE manual testing
# RAM-only storage, sized for copying /workspace source tree

runtime:
  num_threads: 4
  queue_depth: 1024

compose:
  - mod_name: wrp_cte_core
    pool_name: wrp_cte
    pool_query: local
    pool_id: "512.0"

    targets:
      neighborhood: 1
      default_target_timeout_ms: 30000
      poll_period_ms: 5000

    storage:
      - path: "ram::cte_fuse_ram"
        bdev_type: "ram"
        capacity_limit: "4GB"
        score: 0.0

    dpe:
      dpe_type: "max_bw"
